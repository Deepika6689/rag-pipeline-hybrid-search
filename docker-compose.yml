version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
    command: streamlit run frontend/dashboard.py --server.address 0.0.0.0
    depends_on:
      - api
